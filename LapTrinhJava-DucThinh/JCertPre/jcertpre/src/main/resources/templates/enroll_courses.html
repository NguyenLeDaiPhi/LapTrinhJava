<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Đăng ký khóa học</title>
    <!-- Bạn có thể thêm CSS styles ở đây -->
    <style>
      body {
        font-family: sans-serif;
        margin: 20px;
      }
      .container {
        max-width: 800px;
        margin: auto;
        padding: 20px;
        border: 1px solid #ccc;
        border-radius: 8px;
      }
      .course-list {
        list-style-type: none;
        padding: 0;
      }
      .course-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px;
        border-bottom: 1px solid #eee;
      }
      .course-item:last-child {
        border-bottom: none;
      }
      .btn-enroll {
        padding: 8px 15px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        text-decoration: none;
      }
      .btn-enroll:hover {
        background-color: #0056b3;
      }
      .message {
        padding: 10px;
        margin-bottom: 15px;
        border-radius: 4px;
      }
      .success {
        background-color: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }
      .error {
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Đăng ký khóa học</h1>

      <!-- Hiển thị thông báo (nếu có) -->
      <div
        th:if="${successMessage}"
        class="message success"
        th:text="${successMessage}"
      ></div>
      <div
        th:if="${errorMessage}"
        class="message error"
        th:text="${errorMessage}"
      ></div>

      <h2>Danh sách khóa học có sẵn</h2>
      <div th:if="${courses == null or courses.isEmpty()}">
        <p>Hiện tại không có khóa học nào.</p>
      </div>

      <ul
        class="course-list"
        th:if="${courses != null and not courses.isEmpty()}"
      >
        <li th:each="course : ${courses}" class="course-item">
          <div>
            <h3 th:text="${course.title}">Tên khóa học</h3>
            <p th:text="${course.description}">Mô tả khóa học</p>
          </div>
          <!-- Giả sử learnerId được truyền vào model hoặc lấy từ session -->
          <!-- Thay thế '/enroll' bằng endpoint thực tế của bạn -->
          <form th:action="@{/enroll}" method="post" style="display: inline">
            <input
              type="hidden"
              name="learnerId"
              th:value="${currentLearnerId}"
            />
            <!-- currentLearnerId cần được cung cấp bởi controller -->
            <input type="hidden" name="courseId" th:value="${course.id}" />
            <button type="submit" class="btn-enroll">Đăng ký</button>
          </form>
        </li>
      </ul>
    </div>
  </body>
</html>
